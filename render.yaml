services:
  - type: web
    name: adr-prediction
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: MODEL_URL
        sync: false   # set this in the Render dashboard: the GitHub Release
                      # asset URL for ADR_Prediction_Model.pkl
    healthCheckPath: /health
